# HorizontalPodAutoscaler (HPA)

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-webapp-hpa
  namespace: webapp
  
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-webapp

  ## HPA will never go below minReplicas or above maxReplicas
  minReplicas: 2    
  maxReplicas: 6    
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60   
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70   
  behavior:
    scaleUp:
       # wait 30 sec before scale up
      stabilizationWindowSeconds: 30   
      policies:
        - type: Pods
           # Add at most 2 pods at a time
          value: 2                       
          periodSeconds: 30
        - type: Percent
          # Or add 50% of current replicas
          value: 50                       
          periodSeconds: 30
      # Use whichever policy adds more pods
      selectPolicy: Max                   

    scaleDown:
      # Wait 3 minutes before scaling down
      stabilizationWindowSeconds: 180    
      policies:
        - type: Pods
          # Remove at most 1 pod at a time
          value: 1                        
          periodSeconds: 60
      # Use the most conservative policy
      selectPolicy: Min                   
