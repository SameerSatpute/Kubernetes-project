# Namespace Definition

apiVersion: v1
kind: Namespace
metadata:
  name: webapp
  labels:
    app: nginx-webapp
    environment: production

---

# ResourceQuota

apiVersion: v1
kind: ResourceQuota
metadata:
  name: webapp-resource-quota
  namespace: webapp
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 1Gi
    limits.cpu: "4"
    limits.memory: 2Gi

    pods: "10"
    services: "5"
    persistentvolumeclaims: "5"
    secrets: "10"
    configmaps: "10"

---

# LimitRange

apiVersion: v1
kind: LimitRange
metadata:
  name: webapp-limit-range
  namespace: webapp
spec:
  limits:
    - type: Container
      default:             
        cpu: "500m"
        memory: 256Mi
      defaultRequest:      
        cpu: "200m"
        memory: 128Mi
      max:                 
        cpu: "1"
        memory: 512Mi
      min:                
        cpu: "50m"
        memory: 64Mi
