apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-webapp
  namespace: webapp
  labels:
    app: nginx-webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-webapp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: nginx-webapp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /var/cache/nginx/client_temp && \
              mkdir -p /var/cache/nginx/proxy_temp && \
              mkdir -p /var/cache/nginx/fastcgi_temp && \
              mkdir -p /var/cache/nginx/uwsgi_temp && \
              mkdir -p /var/cache/nginx/scgi_temp && \
              mkdir -p /tmp/client_temp && \
              chown -R 101:101 /var/cache/nginx /tmp
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: tmp-dir
              mountPath: /tmp
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080  
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080            # updated to match new port
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080            # updated to match new port
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: nginx-config-volume
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config-volume
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: tmp-dir
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 101
            capabilities:
              drop:
                - ALL
      volumes:
        - name: nginx-config-volume
          configMap:
            name: nginx-config
        - name: nginx-cache
          emptyDir: {}
        - name: tmp-dir
          emptyDir: {}
